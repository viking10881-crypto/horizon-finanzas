<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Horizon 360</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/finanzas.css') }}">
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-brand">H360</div>

    <h1>Iniciar sesión</h1>
    <p>Accede a tu centro financiero inteligente.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="auth-alert {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <label>Correo</label>
      <input type="email" name="email" placeholder="tu@email.com" required>

      <label>Contraseña</label>
      <input type="password" name="password" placeholder="••••••••" required>

      <button type="submit">Entrar</button>
    </form>

    <a href="{{ url_for('registro') }}" class="auth-link">
      Crear una cuenta nueva
    </a>
  </div>

</body>
</html>
