<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}Horizon 360{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/finanzas.css') }}">
</head>

<body>

<!-- TOAST -->
<div class="toast-container">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}

      {% for category, message in messages %}
        <div class="toast {{ category }}">
          {{ message }}
        </div>
      {% endfor %}

    {% endif %}
  {% endwith %}

</div>

<div class="app">

  <!-- HEADER -->
  <header class="header">

    <div class="header__logo">
      <span class="logo-mark">H360</span>
    </div>

    <!-- SEARCH -->
    <div class="header__search">

      <form class="search-form" method="GET" action="{{ url_for('dashboard') }}">

        <input
          type="text"
          name="buscar"
          value="{{ buscar if buscar else '' }}"
          placeholder="Buscar transacciones..."
        >

        <button type="submit">
          Filtrar
        </button>

      </form>

    </div>

    <!-- ACTIONS -->
    <div class="header__actions">

      <!-- THEME -->
      <button class="theme-toggle" onclick="toggleTheme()">
        ☀️
      </button>

      <!-- NUEVO -->
      <button class="btn-add" onclick="abrirModal()">
        + Nuevo gasto
      </button>

      <!-- AVATAR -->
      <div class="avatar">
        JS
      </div>

    </div>

  </header>

  <div class="body">

    <!-- SIDEBAR -->
    <nav class="sidebar">

      <!-- DASHBOARD -->
      <a class="sidebar__icon {% if request.path == '/' %}active{% endif %}"
         title="Dashboard"
         href="/">

        <svg viewBox="0 0 24 24" fill="none">
          <path
            d="M3 11.5L12 4l9 7.5V21a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9.5Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linejoin="round"
          />
        </svg>

      </a>

      <!-- MOVIMIENTOS -->
      <a class="sidebar__icon {% if request.path == '/movimientos' %}active{% endif %}"
         title="Movimientos"
         href="/movimientos">

        <svg viewBox="0 0 24 24" fill="none">

          <path
            d="M17 1l4 4-4 4"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />

          <path
            d="M3 11V9a4 4 0 0 1 4-4h14"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />

          <path
            d="M7 23l-4-4 4-4"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />

          <path
            d="M21 13v2a4 4 0 0 1-4 4H3"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />

        </svg>

      </a>

      <!-- PRESUPUESTOS -->
      <a class="sidebar__icon {% if request.path == '/presupuestos' %}active{% endif %}"
         title="Presupuestos"
         href="/presupuestos">

        <svg viewBox="0 0 24 24" fill="none">

          <path d="M5 21V10"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

          <path d="M12 21V4"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

          <path d="M19 21v-7"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

          <path d="M3 21h18"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

        </svg>

      </a>

      <!-- METAS -->
      <a class="sidebar__icon {% if request.path == '/metas' %}active{% endif %}"
         title="Metas"
         href="/metas">

        <svg viewBox="0 0 24 24" fill="none">

          <rect
            x="3"
            y="6"
            width="18"
            height="13"
            rx="2"
            stroke="currentColor"
            stroke-width="2"
          />

          <path
            d="M3 10h18"
            stroke="currentColor"
            stroke-width="2"
          />

          <path
            d="M7 15h3"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />

        </svg>

      </a>

      <!-- REPORTES -->
      <a class="sidebar__icon {% if request.path == '/reportes' %}active{% endif %}"
         title="Reportes"
         href="/reportes">

        <svg viewBox="0 0 24 24" fill="none">

          <path d="M4 19V5"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

          <path d="M8 19v-6"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

          <path d="M12 19V9"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

          <path d="M16 19v-4"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

          <path d="M20 19V7"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

        </svg>

      </a>

      <div class="sidebar__spacer"></div>

      <!-- AJUSTES -->
      <a class="sidebar__icon {% if request.path == '/ajustes' %}active{% endif %}"
         title="Ajustes"
         href="/ajustes">

        <svg viewBox="0 0 24 24" fill="none">

          <path
            d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"
            stroke="currentColor"
            stroke-width="2"
          />

          <path
            d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.2 2.2 0 0 1-3.11 3.11l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21.5a2.2 2.2 0 0 1-4.4 0v-.08a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.05.05a2.2 2.2 0 0 1-3.11-3.11l.05-.05A1.8 1.8 0 0 0 4.6 15a1.8 1.8 0 0 0-1.66-1.1H2.86a2.2 2.2 0 0 1 0-4.4h.08A1.8 1.8 0 0 0 4.6 8.4a1.8 1.8 0 0 0-.36-1.98l-.05-.05a2.2 2.2 0 0 1 3.11-3.11l.05.05a1.8 1.8 0 0 0 1.98.36 1.8 1.8 0 0 0 1.1-1.66V1.94a2.2 2.2 0 0 1 4.4 0v.08a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.05-.05a2.2 2.2 0 0 1 3.11 3.11l-.05.05a1.8 1.8 0 0 0-.36 1.98 1.8 1.8 0 0 0 1.66 1.1h.08a2.2 2.2 0 0 1 0 4.4h-.08A1.8 1.8 0 0 0 19.4 15Z"
            stroke="currentColor"
            stroke-width="1.5"
          />

        </svg>

      </a>

    </nav>

    <!-- CONTENIDO -->
    <main class="main module-main">

      <section class="module-page">
        {% block content %}{% endblock %}
      </section>

    </main>

  </div>

</div>

<!-- TOAST AUTO REMOVE -->
<script>
  setTimeout(() => {

    document.querySelectorAll(".toast").forEach(t => {

      t.style.opacity = "0";
      t.style.transform = "translateX(20px)";

      setTimeout(() => t.remove(), 300);

    });

  }, 3000);
</script>

<!-- THEME -->
<script>
  function toggleTheme() {

    document.body.classList.toggle("light-mode");

    if (document.body.classList.contains("light-mode")) {
      localStorage.setItem("theme", "light");
    } else {
      localStorage.setItem("theme", "dark");
    }
  }

  window.addEventListener("DOMContentLoaded", () => {

    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "light") {
      document.body.classList.add("light-mode");
    }

  });
</script>

{% block scripts %}{% endblock %}

</body>
</html>
